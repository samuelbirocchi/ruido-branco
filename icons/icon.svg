<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" gradientUnits="userSpaceOnUse" cx="195" cy="164" r="435">
      <stop offset="0%" stop-color="#3b3a8f"/>
      <stop offset="55%" stop-color="#27265f"/>
      <stop offset="100%" stop-color="#161538"/>
    </radialGradient>
  </defs>

  <!-- fundo circular -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- estrelas discretas -->
  <circle cx="150" cy="105" r="7" fill="#c7d2fe" opacity="0.9"/>
  <circle cx="370" cy="88" r="5" fill="#c7d2fe" opacity="0.6"/>
  <circle cx="425" cy="180" r="6" fill="#c7d2fe" opacity="0.75"/>
  <circle cx="95"  cy="215" r="5" fill="#c7d2fe" opacity="0.55"/>

  <!-- lua crescente (recorte via máscara, sem sobrepor o fundo) -->
  <mask id="crescent">
    <circle cx="208" cy="238" r="118" fill="#fff"/>
    <circle cx="260" cy="208" r="104" fill="#000"/>
  </mask>
  <rect x="0" y="0" width="512" height="512" fill="#fbbf24" mask="url(#crescent)"/>

  <!-- ondas de som -->
  <g fill="none" stroke="#a5b4fc" stroke-linecap="round">
    <path d="M 318 196 A 86 86 0 0 1 318 316"  stroke-width="26" opacity="0.95"/>
    <path d="M 366 168 A 124 124 0 0 1 366 344" stroke-width="24" opacity="0.65"/>
    <path d="M 412 142 A 162 162 0 0 1 412 370" stroke-width="22" opacity="0.38"/>
  </g>
</svg>
